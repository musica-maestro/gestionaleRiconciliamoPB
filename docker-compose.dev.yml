# Gestionale Mediazioni - Local development with Docker
# Usage: docker compose -f docker-compose.dev.yml up --build
# Set POCKETBASE_URL in .env (e.g. http://host.docker.internal:8090 for PocketBase on host)

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: gestionale:dev
    container_name: gestionale-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      POCKETBASE_URL: ${POCKETBASE_URL:-http://host.docker.internal:8090}
      SESSION_SECRET: ${SESSION_SECRET:-}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/', (r) => process.exit([200,302].includes(r.statusCode) ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3

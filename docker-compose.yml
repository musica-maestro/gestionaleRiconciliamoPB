version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - APP_HOST=0.0.0.0
      - APP_PORT=3000
      - POCKETBASE_URL=${POCKETBASE_URL}
    # Remove these volume mounts for production - they override the built files
    # volumes:
    #   - ./build:/app/build:ro
    #   - ./public:/app/public:ro
    restart: unless-stopped
